<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shipping Game Lab</title>
  <link rel="stylesheet" href="../dist/plugins/shipping-game/index.css">
  <style>
    body { margin: 0; padding: 18px; background: #eef2f6; color: #172033; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
    .labbar { max-width: 1120px; margin: 0 auto 12px; display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .labbar h1 { font-size: 18px; margin: 0; }
    .labbar code { background: #fff; border: 1px solid #d6dde8; border-radius: 6px; padding: 3px 6px; }
    .lab-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .lab-actions button { border: 1px solid #cbd5e1; border-radius: 8px; background: #fff; padding: 8px 10px; cursor: pointer; }
    #mount { max-width: 1120px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="labbar">
    <div>
      <h1>Shipping Game Plugin Lab</h1>
      <div>Optional assistant bridge: <code>node tools/assistant-bridge-server.js</code></div>
    </div>
    <div class="lab-actions">
      <button type="button" id="reset">Reset local game storage</button>
      <button type="button" id="remount">Remount</button>
    </div>
  </div>
  <div id="mount"></div>

  <script src="lab-host.js"></script>
  <script src="../dist/plugins/shipping-game/index.js"></script>
  <script>
    var hostApi = window.createShippingGameLabHost({ nickname: 'Tymur' });
    function mount() {
      var plugin = window.SkipiPlugins && window.SkipiPlugins['shipping-game'];
      plugin.mount(document.getElementById('mount'), hostApi);
    }
    document.getElementById('reset').onclick = function () {
      Object.keys(localStorage).forEach(function (k) { if (k.indexOf('shipping-game-lab:shipping-game.') === 0) localStorage.removeItem(k); });
      mount();
    };
    document.getElementById('remount').onclick = mount;
    mount();
  </script>
</body>
</html>
